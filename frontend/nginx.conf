server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 2m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # API is proxied to the Go service; /metrics is intentionally NOT exposed.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # This nginx is the ONLY proxy in front of the API, so client-supplied
        # forwarding headers are attacker input: chi's RealIP trusts
        # True-Client-IP first and the LEFTMOST X-Forwarded-For entry, which
        # let clients spoof per-request IPs and sidestep the login rate
        # limiter. Overwrite instead of append, and clear True-Client-IP.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header True-Client-IP "";
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /assets/ {
        # add_header in a location cancels inheritance of the server-level
        # headers, so the full security set is repeated here.
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
