# Iran Gold Predictor — development/single-host deployment.
# Start:  docker compose up -d --build
# The frontend is published on ${FRONTEND_PORT:-8088}; everything else stays on the
# internal network. Postgres/Redis are NOT published to the host.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goldpred}
      POSTGRES_USER: ${POSTGRES_USER:-goldpred}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redisdata:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384m

  api:
    build:
      context: .
      dockerfile: backend-go/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
      PREDICTION_SERVICE_URL: http://prediction-service:8500
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

  prediction-service:
    build:
      context: ./prediction-python
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-goldpred}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-goldpred}
      MODELS_DIR: /app/models
    volumes:
      - models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy   # api runs migrations first
    networks: [internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8500/internal/health', timeout=5)"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1500m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8088}:80"
    networks: [internal]
    healthcheck:
      # 127.0.0.1 (not localhost): Alpine resolves localhost to ::1 first and
      # nginx only listens on IPv4, so the busybox wget probe gets refused.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 20s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  pgdata:
  redisdata:
  models:

networks:
  internal:
    driver: bridge
